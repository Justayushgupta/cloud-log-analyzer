<!DOCTYPE html>
<html>
<head>

<title>Cloud Threat Intelligence</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f172a,#0b1120);
color:white;
}

.header{
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
background:#0f172a;
box-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.container{
padding:40px;
max-width:1200px;
margin:auto;
}

.cards{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-bottom:30px;
}

.card{
flex:1;
min-width:200px;
background:#1e293b;
padding:25px;
border-radius:12px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(59,130,246,.6);
}

.card h2{
font-size:34px;
margin-top:10px;
}

.upload-box{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:30px;
}

.upload-btn{
padding:10px 18px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.upload-btn:hover{
background:#2563eb;
}

.alert{
display:none;
padding:15px;
margin-bottom:20px;
border-radius:8px;
background:#b91c1c;
font-weight:bold;
font-size:18px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:1}
50%{opacity:.5}
100%{opacity:1}
}

canvas{
margin-top:40px;
max-width:700px;
}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:10px;
overflow:hidden;
margin-top:30px;
}

th,td{
padding:12px;
border-bottom:1px solid #334155;
text-align:center;
}

th{
background:#0f172a;
}

tr:hover{
background:#0b1220;
}

.LOW{color:#22c55e}
.MEDIUM{color:#facc15}
.HIGH{color:#f97316}
.CRITICAL{color:#ef4444;font-weight:bold}

</style>

</head>

<body>

<div class="header">
🛡 Cloud Threat Intelligence Dashboard
</div>

<div class="container">

<div class="alert" id="criticalAlert">
🚨 CRITICAL ATTACK DETECTED
</div>

<div class="upload-box">

<h3>Upload Log File</h3>

<input type="file" id="logFile">

<button class="upload-btn" onclick="uploadLog()">
Analyze Log
</button>

<p id="uploadResult"></p>

</div>

<div class="cards">

<div class="card">
<p>Total Logs</p>
<h2 id="totalLogs">0</h2>
</div>

<div class="card">
<p>High / Critical Alerts</p>
<h2 id="highAlerts">0</h2>
</div>

<div class="card">
<p>Average Severity</p>
<h2 id="avgSeverity">0</h2>
</div>

<div class="card">
<p>Top Attack</p>
<h2 id="topAttack">N/A</h2>
</div>

</div>

<canvas id="riskChart"></canvas>

<canvas id="topIpChart"></canvas>

<canvas id="severityTrend"></canvas>

<h3>Recent Logs</h3>

<table>

<thead>
<tr>
<th>ID</th>
<th>Risk</th>
<th>Severity</th>
<th>Attack</th>
<th>Top IP</th>
<th>Time</th>
</tr>
</thead>

<tbody id="reportTable"></tbody>

</table>

</div>

<script>

let riskChart
let severityChart
let ipChart

async function uploadLog(){

const fileInput=document.getElementById("logFile")
const result=document.getElementById("uploadResult")

if(!fileInput.files.length){
alert("Select log file")
return
}

const formData=new FormData()
formData.append("file",fileInput.files[0])

result.innerText="Analyzing..."

try{

const res=await fetch("/upload/",{
method:"POST",
body:formData
})

if(!res.ok) throw new Error()

const data=await res.json()

result.innerText=
"Risk "+data.risk_level+
" | Severity "+data.severity_score+
" | Attack "+data.attack_type

loadDashboard()

}catch{

result.innerText="Upload failed"

}

}

async function loadDashboard(){

try{

const analyticsRes=await fetch("/analytics/")
const analytics=await analyticsRes.json()

animateValue("totalLogs",analytics.total_logs)
animateValue("highAlerts",analytics.high_alerts)
animateValue("avgSeverity",analytics.average_severity)

document.getElementById("topAttack").innerText=analytics.top_attack_type

const alertBox=document.getElementById("criticalAlert")

if(analytics.distribution.CRITICAL>0){

alertBox.style.display="block"

alertBox.innerHTML=
"🚨 CRITICAL ATTACK DETECTED<br>"+
"Total Critical Alerts: "+analytics.distribution.CRITICAL

}else{

alertBox.style.display="none"

}

const ctx=document.getElementById("riskChart").getContext("2d")

if(riskChart)riskChart.destroy()

riskChart=new Chart(ctx,{
type:"doughnut",
data:{
labels:["LOW","MEDIUM","HIGH","CRITICAL"],
datasets:[{
data:[
analytics.distribution.LOW,
analytics.distribution.MEDIUM,
analytics.distribution.HIGH,
analytics.distribution.CRITICAL
],
backgroundColor:["#22c55e","#facc15","#f97316","#ef4444"]
}]
}
})

const ipRes=await fetch("/top-ips/")
const ipData=await ipRes.json()

const ipLabels=ipData.map(x=>x.ip)
const ipCounts=ipData.map(x=>x.attacks)

const ipCanvas=document.getElementById("topIpChart").getContext("2d")

if(ipChart)ipChart.destroy()

ipChart=new Chart(ipCanvas,{
type:"bar",
data:{
labels:ipLabels,
datasets:[{
label:"Top Attacking IPs",
data:ipCounts,
backgroundColor:"#ef4444"
}]
}
})

const reportsRes=await fetch("/reports/")
const reports=await reportsRes.json()

const table=document.getElementById("reportTable")
table.innerHTML=""

let labels=[]
let severityData=[]

reports.slice(0,10).reverse().forEach(r=>{

table.innerHTML+=`
<tr>
<td>${r.id}</td>
<td class="${r.risk_level}">${r.risk_level}</td>
<td>${r.severity_score}</td>
<td>${r.attack_type}</td>
<td>${r.top_ip}</td>
<td>${r.created_at}</td>
</tr>
`

labels.push("Log "+r.id)
severityData.push(r.severity_score)

})

const trend=document.getElementById("severityTrend").getContext("2d")

if(severityChart)severityChart.destroy()

severityChart=new Chart(trend,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Severity Trend",
data:severityData,
borderColor:"#3b82f6",
backgroundColor:"rgba(59,130,246,0.2)",
tension:.3
}]
}
})

}catch(err){

console.error("Dashboard error",err)

}

}

function animateValue(id,end){

const obj=document.getElementById(id)

if(!end){
obj.innerText=0
return
}

let start=0
const step=Math.max(10,Math.floor(800/end))

const timer=setInterval(()=>{

start++
obj.innerText=start

if(start>=end){
obj.innerText=end
clearInterval(timer)
}

},step)

}

loadDashboard()

setInterval(loadDashboard,5000)

</script>

</body>
</html>
