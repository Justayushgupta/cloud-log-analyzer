<!DOCTYPE html>
<html>
<head>
    <title>Cloud Log Intrusion Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            font-size: 36px;
            letter-spacing: 2px;
        }

        .container {
            margin-top: 80px;
        }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 40px;
            width: 500px;
            margin: auto;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        input {
            margin: 20px;
            padding: 10px;
            font-size: 15px;
        }

        button {
            padding: 14px 30px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #00ccaa;
            transform: scale(1.05);
        }

        .status {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<h1>Cloud Intrusion Detection System</h1>

<div class="container">
    <div class="card">
        <input type="file" id="logFile">
        <br>
        <button id="analyzeBtn">Analyze Log File</button>
        <div class="status" id="status"></div>
    </div>
</div>

<script>
document.getElementById("analyzeBtn").addEventListener("click", async function () {

    const fileInput = document.getElementById("logFile");
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select a file first.");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    const statusDiv = document.getElementById("status");
    statusDiv.innerText = "Analyzing logs...";

    try {
        const response = await fetch("/upload/", {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            throw new Error("Server error");
        }

        statusDiv.innerText = "Analysis complete. Redirecting to dashboard...";

        setTimeout(() => {
            window.location.href = "/dashboard";
        }, 1500);

    } catch (error) {
        console.error(error);
        statusDiv.innerText = "Error connecting to backend.";
    }

});
</script>

</body>
</html>
